<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English janla</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- deasy ui and tailwind link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font add  -->

    <!-- popoins font add  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libertinus+Keyboard&family=Outfit:wght@100..900&family=Poppins&family=Roboto:ital,wght@0,100..900;1,100..900&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <!-- siliguri font add  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Libertinus+Keyboard&family=Outfit:wght@100..900&family=Poppins&family=Roboto:ital,wght@0,100..900;1,100..900&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <!-- font awasome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css file link  -->

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- this is navbar section  -->
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-4 w-52 p-2 shadow"
            >
              <li>
                <a><i class="fa-solid fa-circle-question"></i>FAQ</a>
              </li>
              <li>
                <a><i class="fa-solid fa-book-open"></i>Learn</a>
              </li>
              <li>
                <a><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
              </li>
            </ul>
          </div>
          <a class="btn btn-ghost text-xl"
            >English <img src="./assets/logo.png" alt="" />
            <span>জানালা</span></a
          >
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-2">
            <li>
              <a class="btn btn-outline btn-primary"> <i class="fa-solid fa-circle-question"></i> FAQ</a>
            </li>
            <li>
              <a class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>Learn</a>
            </li>
            <li>
              <a class="btn btn-outline btn-primary"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- hero section  -->

    <section>
      <div class="hero bg-base-200">
        <div class="hero-content flex-col lg:flex-row-reverse mx-auto w-11/12 items-center">
          <img src="./assets/hero-student.png" class="max-w-sm" />
          <div>
            <h1 class="text-3xl font-bold">
              <span class="text-[#00BCFF]">English</span> is Easy!!
            </h1>
            <p class="py-6 font-bangla">
              আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
              আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
              যাবে অন্য একটি Level এ
            </p>
            <form
              class="fieldset bg-base-200 border-base-300 rounded-box w-xs border"
            >
              <fieldset class="fieldset">
                <input
                  type="name"
                  class="input validator"
                  placeholder="Your name"
                />
                <p class="validator-hint hidden">Required</p>
              </fieldset>

              <label class="fieldset">
                <input
                  type="password"
                  class="input validator"
                  placeholder="************"
                />
              </label>
            </form>
            <button class="btn btn-primary mt-2">Get Started</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
